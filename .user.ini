; Configuración PHP por directorio (lsphp / PHP-FPM en CloudLinux-HostGator).
; Respaldo de las directivas que también están en .htaccess, por si el host
; no honra `php_value` en .htaccess. Los cambios pueden tardar hasta
; user_ini.cache_ttl (5 min por defecto) en aplicarse.

; Tiempo de INACTIVIDAD tolerado antes de que PHP borre la sesión y
; desloguee al agente. 43200 s = 12 h (cubre turno completo + horas extra).
; Antes era el valor por defecto del hosting (~1440 s / 24 min), causa de
; los cierres de sesión a media jornada reportados en el ticket.
session.gc_maxlifetime = 43200

; Límites de subida (alineados con .htaccess) para fotos de cámara.
upload_max_filesize = 25M
post_max_size = 30M
max_input_time = 120
memory_limit = 256M
